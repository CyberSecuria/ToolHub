 <!DOCTYPE html>
<html lang="en">
<head>

    <link rel="icon" type="image/png" href="Assets/logo ToolHub.png">
    <title>Signup - ToolHub</title>
</head>
 <header>
    <nav>
            <div class="logo">
                <img src="Assets/logo ToolHub.png" alt="logo">
                <h1>ToolHub</h1>
        </div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="tools.html">Tools</a></li>
            <li><a href="ressource.html">Resources</a></li>

        <div class="login">
            <button href="login.html">Login</button>
            <button>Signup</button>
        </div>
    </nav> 
</header>

 <main> 
    <section>
<body>
    <form class="signup-container">
        <h2>Create an Account</h2>
        <label for="username"><span>Username:</span></label>
        <input type="text" id="username" name="username" placeholder="your username" required>
        <label for="email"><span>E-mail:</span></label>
        <input type="email" id="email" name="email" placeholder="your e-mail" required>
        <label for="password"><span>Password:</span></label>
        <input type="password" id="password" name="password" placeholder="your password" required>
        <label for="confirm-password"><span>Confirm Password:</span></label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
        <button type="submit">Signup</button>
        <div class="login-link">
            Already got an account? <a href="login.html">login</a>
        </div>
    </form>
    </section>
     <footer class="site-footer">
        <div class="footer-content" style="text-align:center; padding: 24px 0; background: #ede9fe; color: #334155; font-size: 1em;">

        </div>
     </main>
    </body>
</html>
