 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/index.css">
    <link rel="icon" type="image/png" href="Assets/logo ToolHub.png">
    <title>ToolHub</title>
</head>
<body> 
 <style>
        body {
            background: linear-gradient(135deg, #7b2ff2 0%, #f357a8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signup-container {
            background: rgba(255,255,255,0.12);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 40px 32px;
            max-width: 370px;
            width: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .signup-container h2 {
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 2em;
        }
        .signup-container label {
            font-weight: 500;
            margin-bottom: 6px;
        }
        .signup-container input[type="text"],
        .signup-container input[type="password"],
        .signup-container input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: none;
            margin-bottom: 12px;
            font-size: 1em;
        }
        .signup-container button {
            width: 100%;
            padding: 12px 0;
            background: var(--vpn-primary-purple, #7b2ff2);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .signup-container button:hover {
            background: var(--vpn-primary-purple-dark, #5f1bbf);
        }
        .signup-container .login-link {
            text-align: center;
            margin-top: 10px;
            font-size: 0.95em;
        }
        .signup-container .login-link a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form class="signup-container">
        <h2>Créer un compte</h2>
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="Votre nom d'utilisateur" required>
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" placeholder="Votre e-mail" required>
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Votre mot de passe" required>
        <label for="confirm-password">Confirmer le mot de passe</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmez le mot de passe" required>
        <button type="submit">S'inscrire</button>
        <div class="login-link">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </form>
    </body>
</html>
