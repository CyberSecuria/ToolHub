<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/index.css">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="../Assets/ChatGPT Image 24 mai 2025, 09_34_34.png" alt="logo">
                <h1>Logo</h1>
        </div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="login">
            <button>Login</button>
            <button>Signup</button>
        </div>
    </nav>
    </header>
    <main>
        <div class="hero">
            <img src="hero.png" alt="hero">
        </div>
        <div class="content">
            <h2>Welcome to our website</h2>
            <aside>
                <h3>filters</h3>
                <div class="filter">
                    <input type="text" placeholder="Search">
                    <button>Search</button>
                    <div class="w-64 p-4 space-y-6 bg-white border-r">
                        <!-- Price -->
                        <div>
                          <h2 class="text-sm font-semibold mb-2">Price</h2>
                          <div class="flex items-center justify-between text-sm text-red-500 font-semibold mb-2">
                            <span>$30</span>
                            <span>$100</span>
                          </div>
                          <input type="range" min="0" max="150" value="30" class="w-full">                          
                        </div>
                      
                        <!-- Star Category -->
                        <div>
                          <h2 class="text-sm font-semibold mb-2">Star Category</h2>
                          <ul class="space-y-1 text-sm">
                            <li><label><input type="checkbox"> ⭐⭐⭐⭐⭐ (15)</label></li>
                            <li><label><input type="checkbox"> ⭐⭐⭐⭐☆ (10)</label></li>
                            <li><label><input type="checkbox"> ⭐⭐⭐☆☆ (22)</label></li>
                            <li><label><input type="checkbox"> ⭐⭐☆☆☆ (08)</label></li>
                            <li><label><input type="checkbox"> ⭐☆☆☆☆ (08)</label></li>
                          </ul>
                        </div>
                      
                        <!-- Review Score -->
                        <div>
                          <h2 class="text-sm font-semibold mb-2">Review Score</h2>
                          <ul class="space-y-1 text-sm">
                            <li><label><input type="checkbox"> Superb: 9+ (77)</label></li>
                            <li><label><input type="checkbox"> Good: 7+ (909)</label></li>
                            <li><label><input type="checkbox"> Pleasant: 6+ (1196)</label></li>
                            <li><label><input type="checkbox"> No rating (198)</label></li>
                          </ul>
                        </div>
                      
                        <!-- Facility -->
                        <div>
                          <h2 class="text-sm font-semibold mb-2">Facility</h2>
                          <ul class="space-y-1 text-sm">
                            <li><label><input type="checkbox"> Pet allowed</label></li>
                            <li><label><input type="checkbox"> Wifi</label></li>
                            <li><label><input type="checkbox"> Spa</label></li>
                            <li><label><input type="checkbox"> Restaurant</label></li>
                            <li><label><input type="checkbox"> Pool</label></li>
                            <li><label><input type="checkbox"> Parking</label></li>
                            <li><label><input type="checkbox"> Fitness center</label></li>
                          </ul>
                        </div>
                      
                        <!-- District -->
                        <div>
                          <h2 class="text-sm font-semibold mb-2">District</h2>
                          <ul class="space-y-1 text-sm">
                            <li><label><input type="radio" name="district"> Paris Centre</label></li>
                            <li><label><input type="radio" name="district"> La Defance</label></li>
                            <li><label><input type="radio" name="district"> La Marais</label></li>
                          </ul>
                        </div>
                      </div>
                      
                </div>
               
                </div>
                </div>
            </aside> 
            <div class="content">
                <div class="item">
                 <img src="card.png" alt="card">
                   <h3>Card Title</h3>
                    <p>stars</p>
                      <p>Card Description</p>
                      <button>let see</button>
             </div>
        </div>
    </main>
</body>
</html>
