<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="icon" type="image/png" href="Assets/logo ToolHub.png">
    <title>Login - ToolHub</title>
</head>
<body>
    <header>
    <nav>
            <div class="logo">
                <img src="Assets/logo ToolHub.png" alt="logo">
                <h1>ToolHub</h1>
        </div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="tools.html">Tools</a></li>
            <li><a href="ressource.html">Resources</a></li>
        </ul>
        <div class="login">
            <button href="login.html">Login</button>
            <button>Signup</button>
        </div>
    </nav> 
</header>
    <main> 
    <section>        
 <form class="login-container">
        <h2>Connexion</h2>
        <label for="username"><span>Username:</span></label>
        <input type="text" id="username" name="username" placeholder="your username" required>
        <label for="password"><span>Password:</span></label>
        <input type="password" id="password" name="password" placeholder="your password" required>
        <button type="submit">Login</button>
        <div class="register-link">
            No account? <a href="signup.html">Create an account</a>
        </div>
        
    </form>
</section>
    <footer class="site-footer">
        <div class="footer-content" style="text-align:center; padding: 24px 0; background: #ede9fe; color: #334155; font-size: 1em;">
            <p>&copy; 2025 ToolHub. All rights reserved.</p>
        </div>
    </main>
    </footer>
